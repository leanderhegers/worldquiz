<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Weltkarte Quiz — Canvas-Vergleich</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#eee;overflow:hidden;}
#root{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:#0a0a0a;border-bottom:1px solid #222;z-index:5;}
#back{padding:6px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#eee;cursor:pointer;font-size:13px;}
#back:hover{background:#252525;}
#target-wrap{text-align:center;}
#find-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#999;}
#target-name{font-size:20px;font-weight:700;}
#stats{display:flex;gap:14px;font-size:13px;color:#aaa;}
#stats b{color:#eee;}
#map-wrap{position:relative;flex:1;min-height:0;}
#map{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
#map:active{cursor:grabbing;}
#fps{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#7fdc7f;font:12px/1.4 monospace;padding:4px 8px;border-radius:6px;pointer-events:none;z-index:6;}
#feedback{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:20px;font-size:14px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;background:#222;border:1px solid #555;z-index:6;}
#bottombar{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;background:#0a0a0a;border-top:1px solid #222;font-size:13px;}
#skip{padding:5px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#eee;cursor:pointer;font-size:12px;}
#skip:hover{background:#252525;}
#result{position:absolute;inset:0;background:rgba(10,10,10,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;}
#result h2{font-size:24px;}
#result p{color:#bbb;}
#result button{padding:10px 26px;background:#1D9E75;border:none;color:#fff;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;}
#banner{position:absolute;top:44px;left:50%;transform:translateX(-50%);font-size:11px;color:#e0c896;background:rgba(0,0,0,.4);padding:3px 10px;border-radius:10px;z-index:6;}
</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <button id="back" onclick="location.href='index.html'">← Zurück</button>
    <div id="target-wrap">
      <div id="find-label">FINDE DIESES LAND</div>
      <div id="target-name">–</div>
    </div>
    <div id="stats"><span><b id="s-found">0</b>/<span id="s-total">0</span></span></div>
  </div>
  <div id="map-wrap">
    <div id="banner">Canvas-Prototyp — Alle Länder (Vergleichsversion)</div>
    <canvas id="map"></canvas>
    <div id="fps">— FPS</div>
    <div id="feedback"></div>
    <div id="result">
      <h2>Quiz abgeschlossen!</h2>
      <p id="result-sub"></p>
      <button onclick="location.reload()">Nochmal spielen</button>
    </div>
  </div>
  <div id="bottombar">
    <span><span style="color:#4a8a30">●</span> <b id="s-correct">0</b> richtig &nbsp; <span style="color:#c03820">●</span> <b id="s-wrong">0</b> falsch</span>
    <button id="skip" onclick="skipCountry()">Überspringen</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="countries.js"></script>
<script src="canvas-quiz.js"></script>
</body>
</html>
